name: epl

services:
  postgres:
    image: postgres:17-alpine
    container_name: epl-postgres
    environment:
      POSTGRES_DB: epl
      POSTGRES_USER: epl
      POSTGRES_PASSWORD: epl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epl -d epl"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: epl-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: epl-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/epl
      DB_USERNAME: epl
      DB_PASSWORD: epl
      MQTT_BROKER_URI: tcp://mosquitto:1883
      MQTT_CLIENT_ID: epl-backend
      EPL_ADMIN_BUFFER_SIZE: 500
    ports:
      - "8080:8080"
    volumes:
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: epl-cloudflared
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./infra/cloudflared/config.yml.example:/etc/cloudflared/config.yml:ro
    depends_on:
      - backend
    restart: unless-stopped
    profiles: ["public"]

volumes:
  backend_logs:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
