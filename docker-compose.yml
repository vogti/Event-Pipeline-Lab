name: epl

services:
  postgres:
    image: postgres:17-alpine
    container_name: epl-postgres
    environment:
      POSTGRES_DB: epl
      POSTGRES_USER: epl
      POSTGRES_PASSWORD: epl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epl -d epl"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: epl-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      additional_contexts:
        gitmeta: ./.git
    container_name: epl-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/epl
      DB_USERNAME: epl
      DB_PASSWORD: epl
      MQTT_BROKER_URI: tcp://mosquitto:1883
      MQTT_CLIENT_ID: epl-backend
      EPL_ADMIN_BUFFER_SIZE: 500
      EPL_LOG_MODE_KAFKA_ENABLED: ${EPL_LOG_MODE_KAFKA_ENABLED:-false}
      EPL_LOG_MODE_KAFKA_BOOTSTRAP_SERVERS: ${EPL_LOG_MODE_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      EPL_LOG_MODE_KAFKA_TOPIC: ${EPL_LOG_MODE_KAFKA_TOPIC:-epl.events.log}
      EPL_CLOUDFLARE_ENABLED: ${EPL_CLOUDFLARE_ENABLED:-false}
      EPL_CLOUDFLARE_HOSTNAME: ${EPL_CLOUDFLARE_HOSTNAME:-epl.marcovogt.ch}
      EPL_CLOUDFLARE_READY_URL: ${EPL_CLOUDFLARE_READY_URL:-http://cloudflared:2000/ready}
      EPL_CLOUDFLARE_METRICS_URL: ${EPL_CLOUDFLARE_METRICS_URL:-http://cloudflared:2000/metrics}
      EPL_CLOUDFLARE_REQUEST_TIMEOUT: ${EPL_CLOUDFLARE_REQUEST_TIMEOUT:-PT2S}
    ports:
      - "8080:8080"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped

  kafka:
    image: redpandadata/redpanda:v24.3.6
    container_name: epl-kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - 0.0.0.0:9092
      - --advertise-kafka-addr
      - kafka:9092
    ports:
      - "9092:9092"
    restart: unless-stopped
    profiles: ["logmode"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: epl-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: epl-cloudflared
    command: tunnel --no-autoupdate --metrics 0.0.0.0:2000 run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - frontend
    restart: unless-stopped
    profiles: ["public"]

volumes:
  backend_logs:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
