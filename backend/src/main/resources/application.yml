server:
  port: 8080

spring:
  application:
    name: epl-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/epl}
    username: ${DB_USERNAME:epl}
    password: ${DB_PASSWORD:epl}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  file:
    name: logs/epl-backend.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 14
  level:
    ch.marcovogt.epl: INFO

# Phase 1 operational defaults
# Topic filters include both canonical EPL topics (epld/{deviceId}/...) and observed Shelly capture topics (epld01/...)
epl:
  feed:
    admin-buffer-size: ${EPL_ADMIN_BUFFER_SIZE:500}
  device:
    offline-timeout: ${EPL_DEVICE_OFFLINE_TIMEOUT:PT25S}
    offline-check-delay-ms: ${EPL_DEVICE_OFFLINE_CHECK_DELAY_MS:5000}
  mqtt:
    broker-uri: ${MQTT_BROKER_URI:tcp://localhost:1883}
    client-id: ${MQTT_CLIENT_ID:epl-backend}
    username: ${MQTT_USERNAME:}
    password: ${MQTT_PASSWORD:}
    qos: ${MQTT_QOS:1}
    reconnect-delay-ms: ${MQTT_RECONNECT_DELAY_MS:5000}
    clean-session: true
    append-random-client-suffix: true
    topic-filters:
      - epld/+/event/#
      - epld/+/status/#
      - epld/+/ack/#
      - +/events/rpc
      - +/telemetry
      - +/online
      - +/status/#
