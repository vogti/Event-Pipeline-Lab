<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EPL Admin Event Stream Test</title>
    <style>
        body {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            margin: 0;
            padding: 1rem;
            background: #0e1117;
            color: #e6edf3;
        }

        h1 {
            margin-top: 0;
            font-size: 1.2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1rem;
        }

        .panel {
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 0.75rem;
            background: #161b22;
            min-height: 300px;
        }

        .toolbar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        button {
            background: #238636;
            border: none;
            color: white;
            border-radius: 6px;
            padding: 0.45rem 0.75rem;
            cursor: pointer;
        }

        button.secondary {
            background: #30363d;
        }

        input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #e6edf3;
            border-radius: 6px;
            padding: 0.45rem 0.6rem;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.3;
            font-size: 0.8rem;
        }

        .status {
            margin-bottom: 0.5rem;
            color: #7ee787;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<h1>EPL Phase 2 Admin Test</h1>
<div class="toolbar">
    <input id="username" value="admin" placeholder="Username">
    <input id="pin" type="password" value="admin123" placeholder="PIN">
    <button id="loginBtn">Login</button>
    <button id="logoutBtn" class="secondary">Logout</button>
</div>
<div class="status" id="status">WS: disconnected</div>
<div class="toolbar">
    <button id="pauseBtn" class="secondary">Pause</button>
    <button id="clearBtn" class="secondary">Clear</button>
    <button id="reloadBtn">Reload Recent</button>
</div>
<div class="grid">
    <section class="panel">
        <h2>Events</h2>
        <pre id="events"></pre>
    </section>
    <section class="panel">
        <h2>Device Status</h2>
        <pre id="devices"></pre>
    </section>
</div>
<script>
    const maxLines = 200;
    let paused = false;
    let sessionToken = localStorage.getItem('eplAdminSessionToken') || '';
    let ws = null;

    const eventsEl = document.getElementById('events');
    const devicesEl = document.getElementById('devices');
    const statusEl = document.getElementById('status');
    const deviceMap = new Map();

    function authHeaders() {
        if (!sessionToken) {
            return {};
        }
        return {'X-EPL-Session': sessionToken};
    }

    async function login() {
        const username = document.getElementById('username').value.trim();
        const pin = document.getElementById('pin').value.trim();

        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, pin})
        });

        if (!response.ok) {
            throw new Error(`Login failed (${response.status})`);
        }

        const me = await response.json();
        sessionToken = me.sessionToken;
        localStorage.setItem('eplAdminSessionToken', sessionToken);

        statusEl.textContent = `Logged in as ${me.username}; WS reconnecting...`;
        connectWs();
        await loadRecent();
    }

    async function logout() {
        if (!sessionToken) {
            return;
        }

        await fetch('/api/auth/logout', {
            method: 'POST',
            headers: authHeaders()
        });

        sessionToken = '';
        localStorage.removeItem('eplAdminSessionToken');

        if (ws) {
            ws.close();
            ws = null;
        }

        statusEl.textContent = 'Logged out';
    }

    function appendLine(el, text) {
        const lines = el.textContent ? el.textContent.split('\n') : [];
        lines.push(text);
        while (lines.length > maxLines) {
            lines.shift();
        }
        el.textContent = lines.join('\n');
    }

    async function loadRecent() {
        if (!sessionToken) {
            throw new Error('Login required');
        }

        const response = await fetch('/api/admin/events?limit=50', {
            headers: authHeaders()
        });
        if (!response.ok) {
            throw new Error(`Load events failed (${response.status})`);
        }

        const data = await response.json();
        eventsEl.textContent = '';
        data.reverse().forEach(event => {
            appendLine(eventsEl, `${event.ingestTs} ${event.deviceId} ${event.eventType} ${event.topic}`);
        });

        const devicesRes = await fetch('/api/admin/devices', {
            headers: authHeaders()
        });
        if (!devicesRes.ok) {
            throw new Error(`Load devices failed (${devicesRes.status})`);
        }

        const devices = await devicesRes.json();
        deviceMap.clear();
        devices.forEach(device => deviceMap.set(device.deviceId, device));
        renderDevices();
    }

    function renderDevices() {
        const rows = [...deviceMap.values()].map(device => {
            return `${device.deviceId} online=${device.online} lastSeen=${device.lastSeen} rssi=${device.rssi ?? '-'} `;
        });
        devicesEl.textContent = rows.join('\n');
    }

    function connectWs() {
        if (!sessionToken) {
            statusEl.textContent = 'WS: login required';
            return;
        }

        if (ws) {
            ws.close();
        }

        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws/admin?token=${encodeURIComponent(sessionToken)}`);

        ws.onopen = () => {
            statusEl.textContent = 'WS: connected';
        };

        ws.onclose = () => {
            statusEl.textContent = 'WS: disconnected, retrying...';
            setTimeout(() => {
                if (sessionToken) {
                    connectWs();
                }
            }, 1500);
        };

        ws.onerror = () => {
            statusEl.textContent = 'WS: error';
        };

        ws.onmessage = event => {
            if (paused) {
                return;
            }
            const envelope = JSON.parse(event.data);
            if (envelope.type === 'event.feed.append') {
                const e = envelope.payload;
                appendLine(eventsEl, `${e.ingestTs} ${e.deviceId} ${e.eventType} ${e.topic}`);
            }
            if (envelope.type === 'device.status.updated') {
                const d = envelope.payload;
                deviceMap.set(d.deviceId, d);
                renderDevices();
            }
        };
    }

    document.getElementById('pauseBtn').addEventListener('click', () => {
        paused = !paused;
        document.getElementById('pauseBtn').textContent = paused ? 'Resume' : 'Pause';
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
        eventsEl.textContent = '';
    });

    document.getElementById('reloadBtn').addEventListener('click', () => {
        loadRecent().catch(error => {
            statusEl.textContent = String(error);
        });
    });

    document.getElementById('loginBtn').addEventListener('click', () => {
        login().catch(error => {
            statusEl.textContent = String(error);
        });
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        logout().catch(error => {
            statusEl.textContent = String(error);
        });
    });

    if (sessionToken) {
        loadRecent().catch(error => {
            statusEl.textContent = String(error);
        });
        connectWs();
    } else {
        statusEl.textContent = 'Login required';
    }
</script>
</body>
</html>
